<style>
:root { --gold:#C48A28; --cream:#F2DDAA; --panel:#150C03; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#000; overflow:hidden; font-family:Palatino,Georgia,serif; }
#canvas3d { position:fixed; inset:0; display:block; touch-action:none; }

#mira {

  border-radius:50%; background:rgba(242,221,170,.7); pointer-events:none; z-index:50;
}
#suggerimento {

#popup .corsivo { font-style:italic; opacity:.7; }
#popup .bottoni { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
#popup .bottoni.colonna { flex-direction:column; align-items:stretch; }
#popup button, #popup .opzione {

#popup .si { background:#382010; border:2px solid var(--gold); }

  60%{transform:translateX(-5px);} 80%{transform:translateX(5px);}

.controllo-fisso.sinistra { left:18px; }
.controllo-fisso.destra { right:18px; }

.controllo-fisso:disabled { opacity:.3; cursor:default; }

.pagina-libro {

<script>

/* ══════════════════════════════════════════
   CONNESSIONE SUPABASE E STATO CONDIVISO
   (identico alla versione 360°: stessa tabella,
   stessa logica di salvataggio/realtime)
   ══════════════════════════════════════════ */

const SUPABASE_URL = "https://vozzdhpwiauchvznfvsi.supabase.co";
const SUPABASE_KEY = "sb_publishable_aLZfS_idBIXD1mEixlnGsA_FF70VGni";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CODICE_PARTITA = sessionStorage.getItem("codicePartita");

let statoLocale = { indizi: [], risposte: {}, serrature_sbloccate: [], messaggi: [] };
let statoCaricato = false;

async function caricaStatoRemoto() {
  const { data, error } = await sb.from("partite").select("*").eq("codice", CODICE_PARTITA).maybeSingle();
  if (!data) {
    const nuova = { codice: CODICE_PARTITA, indizi: [], risposte: {}, serrature_sbloccate: [], messaggi: [] };
    await sb.from("partite").insert(nuova);
    statoLocale = nuova;
  } else {
    statoLocale = data;
    if (!statoLocale.messaggi) statoLocale.messaggi = [];
  }
  statoCaricato = true;
}

async function salvaStatoRemoto() {
  const { codice, indizi, risposte, serrature_sbloccate, messaggi } = statoLocale;
  await sb.from("partite").update({ indizi, risposte, serrature_sbloccate, messaggi,
    aggiornato_il: new Date().toISOString() }).eq("codice", codice);
}

function iscrivitiAggiornamenti() {
  sb.channel("partita-" + CODICE_PARTITA)
    .on("postgres_changes",
      { event: "UPDATE", schema: "public", table: "partite", filter: `codice=eq.${CODICE_PARTITA}` },
      payload => {
        statoLocale = payload.new;
        if (!statoLocale.messaggi) statoLocale.messaggi = [];
        aggiornaFeedTaccuino();
      })
    .subscribe();
}

function aggiungiIndizio(id, testo, stanza) {
  if (!statoLocale.indizi.find(i => i.id === id)) {
    statoLocale.indizi.push({ id, testo, stanza, quando: Date.now() });
    salvaStatoRemoto();
  }
}
function serraturaSbloccata(stanzaId) {
  return statoLocale.serrature_sbloccate.includes(stanzaId);
}
function sbloccaSerratura(stanzaId) {
  if (!statoLocale.serrature_sbloccate.includes(stanzaId)) {
    statoLocale.serrature_sbloccate.push(stanzaId);
    salvaStatoRemoto();
  }
}

function escapeHtml(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ══════════════════════════════════════════
   POPUP (stesso motore usato nelle stanze 360°)
   ══════════════════════════════════════════ */
function mostraPopup(html) {
  document.getElementById("popup").innerHTML = html;
  document.getElementById("velo").classList.add("attivo");
}
function chiudiPopup() {
  document.getElementById("velo").classList.remove("attivo");
  document.getElementById("popup").innerHTML = "";
}
document.addEventListener("DOMContentLoaded", () => {
  const velo = document.getElementById("velo");
  velo.addEventListener("click", e => { if (e.target === velo) chiudiPopup(); });
});

/* ══════════════════════════════════════════
   TACCUINO CONDIVISO (feed cronologico indizi + messaggi)
   ══════════════════════════════════════════ */
function costruisciFeedHtml() {
  const voci = [
    ...statoLocale.indizi.map(i => ({ tipo:"indizio", testo:`${i.stanza} — ${i.testo}`, quando:i.quando||0 })),
    ...(statoLocale.messaggi||[]).map(m => ({ tipo:"messaggio", testo:m.testo, quando:m.quando||0 }))
  ].sort((a,b) => a.quando - b.quando);

  if (!voci.length) return `<div class="testo corsivo">Ancora nessun indizio né messaggio.</div>`;

  return voci.map(v => `
    <div class="voce-feed ${v.tipo}">
      <span class="etichetta-feed">${v.tipo === "indizio" ? "📖" : "💬"}</span>${escapeHtml(v.testo)}
    </div>
  `).join("");
}

function aggiornaFeedTaccuino() {
  const el = document.getElementById("listaFeed");
  if (!el) return;
  el.innerHTML = costruisciFeedHtml();
  el.scrollTop = el.scrollHeight;
}

function apriTaccuino() {
  mostraPopup(`
    <div class="nome">― Taccuino condiviso ―</div>
    <div class="taccuino-feed" id="listaFeed">${costruisciFeedHtml()}</div>
    <div class="input-messaggio-riga">
      <input type="text" id="inputMessaggio" placeholder="Scrivi un messaggio…"
        onkeydown="if(event.key==='Enter')inviaMessaggio()">
      <button onclick="inviaMessaggio()">Invia</button>
    </div>
    <div class="bottoni" style="margin-top:16px"><button class="si" onclick="chiudiPopup()">Chiudi</button></div>
  `);
  setTimeout(() => {
    const el = document.getElementById("listaFeed");
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

function inviaMessaggio() {
  const input = document.getElementById("inputMessaggio");
  const testo = input.value.trim();
  if (!testo) return;
  if (!statoLocale.messaggi) statoLocale.messaggi = [];
  statoLocale.messaggi.push({ testo, quando: Date.now() });
  input.value = "";
  salvaStatoRemoto();
  aggiornaFeedTaccuino();
}

function iniettaControlliFissi(stanzaPrecedenteUrl) {
  const div = document.createElement("div");
  div.innerHTML = `
    <button id="btnIndietro" class="controllo-fisso sinistra" title="Torna indietro">←</button>
    <button id="btnTaccuino" class="controllo-fisso destra" title="Taccuino">📒</button>
    <div class="badge-codice">Partita: ${CODICE_PARTITA}</div>
  `;
  document.body.appendChild(div);
  const btnIndietro = document.getElementById("btnIndietro");
  if (stanzaPrecedenteUrl) {
    btnIndietro.addEventListener("click", () => { window.location.href = stanzaPrecedenteUrl; });
  } else {
    btnIndietro.disabled = true;
  }
  document.getElementById("btnTaccuino").addEventListener("click", apriTaccuino);
}

const PAGINA_EXTRA = {
  id: "s1_extra", stanza: STANZA_ID, pagina: 67,
  testo: "Nel margine, scritto a mano: «...e se la sala successiva chiedesse di sommare dei numeri, sappi già questo: il risultato che cerchi è comunque minore di cinquanta.»"
};

const SEQUENZA_CORRETTA = [...QUIZ_STANZA]
  .sort((a, b) => a.pagina - b.pagina)
  .map(q => q.letteraCorretta);

const LETTERE_RULLO = ["E", "C", "G", "A"];

function apriQuiz(quiz) {
  aggiungiIndizio(quiz.id, `Pagina ${quiz.pagina} letta`, quiz.stanza);
  mostraPopup(`
    <div class="pagina-libro">
      <div class="intestazione-pagina">Frammento ritrovato</div>
      <div class="domanda-testo">${quiz.html}</div>
      <div class="numero-pagina">— ${quiz.pagina} —</div>
      <button class="chiudi-pagina" onclick="chiudiPopup()">Chiudi</button>

}

function mostraPaginaExtra(pagina) {
  aggiungiIndizio(pagina.id, pagina.testo, pagina.stanza);
  mostraPopup(`
    <div class="pagina-libro">
      <div class="intestazione-pagina">Frammento ritrovato</div>
      <div class="domanda-testo">${pagina.testo}</div>
      <div class="numero-pagina">— ${pagina.pagina} —</div>
      <button class="chiudi-pagina" onclick="chiudiPopup()">Chiudi</button>
    </div>

}

function apriSerratura(config) {
  if (serraturaSbloccata(config.stanzaId)) {
    mostraPopup(`
      <div class="nome">― Serratura ―</div>
      <div class="testo">La serratura è già aperta. Puoi proseguire.</div>
      <div class="bottoni">
        <button class="si" onclick="chiudiPopup(); ${config.vaiAvantiJS || ''}">Prosegui →</button>
        <button class="no" onclick="chiudiPopup()">Chiudi</button>
      </div>
    `);
    return;
  }
  window._rulli = [0, 0, 0, 0];
  window._serraturaConfig = config;
  mostraPopup(`
    <div class="nome">― Serratura a combinazione ―</div>
    <div class="testo corsivo" style="font-size:14px">
      Inciso sopra: «...e se le lettere giuste fossero nascoste
      nelle risposte giuste?...»
    </div>
    <div class="rulli">
      ${[0,1,2,3].map(i => `
        <div class="rullo">
          <button class="freccia" onclick="ruotaRullo(${i}, 1)">▲</button>
          <div class="lettera-rullo" id="rullo${i}">E</div>
          <button class="freccia" onclick="ruotaRullo(${i}, -1)">▼</button>
        </div>
      `).join("")}
    </div>
    <div id="feedbackSerratura" class="suggerimento-testo" style="min-height:18px"></div>
    <div class="bottoni" style="margin-top:14px">
      <button class="si" onclick="verificaSerratura()">Apri</button>
      <button class="no" onclick="chiudiPopup()">Chiudi</button>
    </div>

}

function ruotaRullo(indice, direzione) {
  const n = LETTERE_RULLO.length;
  window._rulli[indice] = (window._rulli[indice] + direzione + n) % n;
  document.getElementById(`rullo${indice}`).textContent = LETTERE_RULLO[window._rulli[indice]];
}

function verificaSerratura() {
  const config = window._serraturaConfig;
  const combinazione = window._rulli.map(i => LETTERE_RULLO[i]);
  const corretta = config.sequenza;
  if (combinazione.every((l, i) => l === corretta[i])) {
    sbloccaSerratura(config.stanzaId);
    mostraPopup(`
      <div class="nome">― Click! ―</div>
      <div class="testo">La serratura si apre.</div>
      <div class="bottoni"><button class="si" onclick="chiudiPopup(); ${config.vaiAvantiJS || ''}">Prosegui →</button></div>

  } else {
    document.getElementById("feedbackSerratura").textContent = "Combinazione errata. Riprova.";
    const box = document.querySelector("#popup");
    box.classList.remove("scuoti-popup");
    void box.offsetWidth;
    box.classList.add("scuoti-popup");
  }
}

function mostraProssimaStanza() {

}

/* ══════════════════════════════════════════
   SCENA 3D — biblioteca stile "Minecraft"
   ══════════════════════════════════════════ */
const STANZA_LATO = 21;
const ALTEZZA = 4;
const ALTEZZA_OCCHI = 1.6;
const RAGGIO_INTERAZIONE = 2.6;
const meta = STANZA_LATO / 2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0604);
scene.fog = new THREE.Fog(0x0a0604, 9, 26);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, ALTEZZA_OCCHI, 5.5);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("canvas3d"), antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

scene.add(new THREE.AmbientLight(0xffe0b8, 0.32));
const luceAlto = new THREE.PointLight(0xffddaa, 0.35, 30);
luceAlto.position.set(0, ALTEZZA - 0.3, 0);
scene.add(luceAlto);

/* ══════════════════════════════════════════
   TEXTURE PROCEDURALI — generate via canvas 2D, nessuna immagine
   esterna incorporata (coerente con lo stile "solo geometrie" del
   prototipo): un pavimento a listarelli di parquet e un cielo per
   le finestre.
   ══════════════════════════════════════════ */
function creaTexturaParquet() {
  const size = 256;
  const canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");
  const toniLegno = ["#6b4c30", "#5f4128", "#75543a", "#664526", "#6f4e33"];
  const assiW = 64, assiH = 16;
  let riga = 0;
  for (let y = 0; y < size; y += assiH) {
    const offset = (riga % 2 === 0) ? 0 : assiW / 2;
    for (let x = -assiW; x < size + assiW; x += assiW) {
      ctx.fillStyle = toniLegno[Math.floor(Math.random() * toniLegno.length)];
      ctx.fillRect(x + offset, y, assiW - 2, assiH - 2);
    }
    riga++;
  }
  ctx.strokeStyle = "rgba(20,12,6,0.55)";
  ctx.lineWidth = 1;
  for (let y = 0; y <= size; y += assiH) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(size, y); ctx.stroke();
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(STANZA_LATO / 2, STANZA_LATO / 2);
  return texture;
}

function creaTexturaCielo(conLuna) {
  const size = 128;
  const canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createLinearGradient(0, 0, 0, size);
  grad.addColorStop(0, "#0B1730");
  grad.addColorStop(1, "#223A5E");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  if (conLuna) {
    // luna, con un lieve alone
    ctx.fillStyle = "rgba(242,236,217,0.18)";
    ctx.beginPath(); ctx.arc(92, 32, 22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#F2ECD9";
    ctx.beginPath(); ctx.arc(92, 32, 13, 0, Math.PI * 2); ctx.fill();
  }
  // stelle sparse, dimensione e luminosità casuali
  for (let i = 0; i < 45; i++) {
    const sx = Math.random() * size, sy = Math.random() * size * 0.85;
    const r = Math.random() * 1.2 + 0.3;
    ctx.fillStyle = `rgba(255,255,255,${(0.35 + Math.random() * 0.6).toFixed(2)})`;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
  }
  return new THREE.CanvasTexture(canvas);
}
const texturaCieloConLuna = creaTexturaCielo(true);
const texturaCieloSenzaLuna = creaTexturaCielo(false);


/* natura morta geometrica — forme semplici (frutta, brocca, piano
   d'appoggio) in stile "cubista", per il quadro fra le due torce */
function creaTexturaNaturaMorta() {
  const size = 160;
  const canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#362A1E";
  ctx.fillRect(0, 0, size, size);
  // piano d'appoggio
  ctx.fillStyle = "#241A10";
  ctx.beginPath();
  ctx.moveTo(0, 120); ctx.lineTo(size, 108); ctx.lineTo(size, size); ctx.lineTo(0, size);
  ctx.closePath(); ctx.fill();
  // brocca (trapezio + collo)
  ctx.fillStyle = "#7A5A3A";
  ctx.beginPath();
  ctx.moveTo(58, 118); ctx.lineTo(102, 112); ctx.lineTo(96, 62); ctx.lineTo(64, 66);
  ctx.closePath(); ctx.fill();
  ctx.fillRect(74, 48, 12, 20);
  // frutta geometrica (cerchi/ellissi in toni caldi)
  [
    { x: 42, y: 100, r: 20, c: "#8B3A2A" },
    { x: 118, y: 104, r: 17, c: "#B08A3A" },
    { x: 70, y: 90, r: 15, c: "#5A6B3A" },
    { x: 96, y: 96, r: 12, c: "#6B3A2A" }
  ].forEach(f => {
    ctx.fillStyle = f.c;
    ctx.beginPath(); ctx.ellipse(f.x, f.y, f.r, f.r * 0.85, 0, 0, Math.PI * 2); ctx.fill();
  });
  // contorni scuri per accentuare lo stile "a facce piatte"
  ctx.strokeStyle = "rgba(20,12,6,0.55)";
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, size, size);
  return new THREE.CanvasTexture(canvas);
}
const texturaNaturaMorta = creaTexturaNaturaMorta();

function creaTexturaArazzo() {
  const size = 128;
  const canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#5A1E1E";
  ctx.fillRect(0, 0, size, size);
  ctx.strokeStyle = "#C48A28";
  ctx.lineWidth = 3;
  // cornice
  ctx.strokeRect(6, 6, size - 12, size - 12);
  // motivo a losanghe ripetuto
  ctx.lineWidth = 2;
  for (let y = 16; y < size; y += 24) {
    for (let x = 16; x < size; x += 24) {
      ctx.beginPath();
      ctx.moveTo(x, y - 8); ctx.lineTo(x + 8, y); ctx.lineTo(x, y + 8); ctx.lineTo(x - 8, y);
      ctx.closePath();
      ctx.stroke();
    }
  }
  return new THREE.CanvasTexture(canvas);
}

/* ══════════════════════════════════════════
   "SOLIDITÀ" DEGLI ARREDI — non è una vera fisica, ma basta a evitare
   di camminare dentro ai mobili o troppo a ridosso di pareti/porta.
   Ogni ostacolo è un rettangolo assiale {minX,maxX,minZ,maxZ} calcolato
   AUTOMATICAMENTE dal bounding box reale dell'oggetto 3D (THREE.Box3) —
   basta chiamare registraIngombro(gruppo) dopo aver costruito qualunque
   mobile (tavolo, libreria, o quel che aggiungeremo in futuro) e la sua
   sagoma diventa automaticamente invalicabile, senza stimare a mano
   raggi o dimensioni. La correzione viene applicata OGNI FRAME alla
   posizione reale della camera (non solo al punto di destinazione del
   click): così non ci si taglia più dentro l'ostacolo durante il
   tragitto, anche se il punto cliccato era oltre il mobile.
   ══════════════════════════════════════════ */
const RAGGIO_GIOCATORE = 0.45;
const MARGINE_PARETE = 1.3; // distanza minima da pareti/porta
const ingombri = []; // { minX, maxX, minZ, maxZ }

function registraIngombro(oggetto3D, margineExtra = RAGGIO_GIOCATORE) {
  oggetto3D.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(oggetto3D);
  ingombri.push({
    minX: box.min.x - margineExtra, maxX: box.max.x + margineExtra,
    minZ: box.min.z - margineExtra, maxZ: box.max.z + margineExtra
  });
}

function risolviPosizioneValida(x, z) {
  let px = Math.max(-meta + MARGINE_PARETE, Math.min(meta - MARGINE_PARETE, x));
  let pz = Math.max(-meta + MARGINE_PARETE, Math.min(meta - MARGINE_PARETE, z));
  ingombri.forEach(r => {
    if (px > r.minX && px < r.maxX && pz > r.minZ && pz < r.maxZ) {
      // il punto è dentro l'ingombro: lo spingo fuori dal lato più vicino
      const distSx = px - r.minX, distDx = r.maxX - px;
      const distSu = pz - r.minZ, distGiu = r.maxZ - pz;
      const minDist = Math.min(distSx, distDx, distSu, distGiu);
      if (minDist === distSx) px = r.minX;
      else if (minDist === distDx) px = r.maxX;
      else if (minDist === distSu) pz = r.minZ;
      else pz = r.maxZ;
    }
  });
  return { x: px, z: pz };
}

/* ══════════════════════════════════════════
   LIBRERIE — struttura in legno con ripiani,
   libri decorativi (non interagibili) + libri
   "speciali" (interagibili, con bagliore dorato)
   ══════════════════════════════════════════ */
const matLegnoScuro = new THREE.MeshStandardMaterial({ color: 0x3a2412 });
const matLegnoChiaro = new THREE.MeshStandardMaterial({ color: 0x6b4a2c });
const COLORI_LIBRI = [0x6B4A35, 0x5A4A32, 0x4A5240];

/* texture per la "costa" dei libri: colore di sfondo coerente con la
   copertina, due bande dorate decorative e un titolo scritto in
   verticale, come sui dorsi dei libri antichi */
function creaTexturaCosta(coloreHex, titolo) {
  const w = 64, h = 160;
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = coloreHex;
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = "rgba(196,138,40,0.85)";
  ctx.lineWidth = 3;
  ctx.strokeRect(3, 3, w - 6, h - 6);
  ctx.fillStyle = "rgba(196,138,40,0.6)";
  ctx.fillRect(6, 20, w - 12, 5);
  ctx.fillRect(6, h - 25, w - 12, 5);
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = "#EADFC0";
  ctx.font = "bold 15px Georgia, serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(titolo, 0, 0);
  ctx.restore();
  return new THREE.CanvasTexture(canvas);
}

const TITOLI_DECORATIVI = ["DE ARTE", "HISTORIA", "ENIGMATA", "ANNALES", "SAPIENTIA", "FRAGMENTA"];
// un piccolo set precalcolato (colore copertina + texture costa abbinata),
// riusato casualmente sui libri decorativi invece di generarne uno per libro
const SPINE_LIBRI = [];
COLORI_LIBRI.forEach((colore, i) => {
  [0, 1].forEach(v => {
    const esadecimale = "#" + colore.toString(16).padStart(6, "0");
    const titolo = TITOLI_DECORATIVI[(i * 2 + v) % TITOLI_DECORATIVI.length];
    SPINE_LIBRI.push({ coloreCopertina: colore, texturaCosta: creaTexturaCosta(esadecimale, titolo) });
  });
});

// larghezza libreria, altezza, profondità
const LIB_W = 3.4, LIB_H = 2.6, LIB_D = 0.5;

function creaLibreria(x, z, ry, libriSpeciali) {
  // libriSpeciali: array di { offsetX, livello, dati } — dati passati a registraInterattivo
  const gruppo = new THREE.Group();
  gruppo.position.set(x, 0, z);
  gruppo.rotation.y = ry;
  scene.add(gruppo);

  // pannello di fondo
  const fondo = new THREE.Mesh(new THREE.BoxGeometry(LIB_W, LIB_H, 0.1), matLegnoScuro);
  fondo.position.set(0, LIB_H / 2, -LIB_D / 2 + 0.05);
  gruppo.add(fondo);

  // fianchi
  [-1, 1].forEach(lato => {
    const fianco = new THREE.Mesh(new THREE.BoxGeometry(0.08, LIB_H, LIB_D), matLegnoScuro);
    fianco.position.set(lato * (LIB_W / 2 - 0.04), LIB_H / 2, 0);
    gruppo.add(fianco);
  });

  // 3 ripiani
  const livelliY = [0.15, LIB_H * 0.42, LIB_H * 0.72];
  livelliY.forEach(y => {
    const ripiano = new THREE.Mesh(new THREE.BoxGeometry(LIB_W - 0.16, 0.06, LIB_D - 0.1), matLegnoChiaro);
    ripiano.position.set(0, y, 0.02);
    gruppo.add(ripiano);
  });

  // libri decorativi lungo ogni ripiano
  livelliY.forEach((y, livello) => {
    let cursore = -LIB_W / 2 + 0.3;
    while (cursore < LIB_W / 2 - 0.3) {
      // salta lo spazio riservato ai libri speciali di questo livello
      const speciale = libriSpeciali.find(s => s.livello === livello && Math.abs(s.offsetX - cursore) < 0.35);
      if (speciale) { cursore += 0.45; continue; }
      const scelta = SPINE_LIBRI[Math.floor(Math.random() * SPINE_LIBRI.length)];
      const matCopertina = new THREE.MeshStandardMaterial({ color: scelta.coloreCopertina });
      const matCosta = new THREE.MeshStandardMaterial({ map: scelta.texturaCosta });
      // ordine facce BoxGeometry: +x,-x,+y,-y,+z,-z — la costa (+z) è
      // il lato rivolto verso la stanza, le altre restano il colore di copertina
      const libro = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.3, 0.2),
        [matCopertina, matCopertina, matCopertina, matCopertina, matCosta, matCopertina]
      );
      libro.position.set(cursore, y + 0.2, 0.02);
      libro.rotation.y = (Math.random() - 0.5) * 0.15;
      gruppo.add(libro);
      cursore += 0.16;
    }
  });

  // libri speciali (interagibili)
  libriSpeciali.forEach(s => {
    const y = livelliY[s.livello];
    const etichetta = s.dati.quiz ? `PAG. ${s.dati.quiz.pagina}` : "★";
    const matCopertinaSpeciale = new THREE.MeshStandardMaterial({ color: 0xD4A548 });
    const matCostaSpeciale = new THREE.MeshStandardMaterial({ map: creaTexturaCosta("#D4A548", etichetta) });
    const libroSpeciale = new THREE.Mesh(
      new THREE.BoxGeometry(0.16, 0.34, 0.24),
      [matCopertinaSpeciale, matCopertinaSpeciale, matCopertinaSpeciale, matCopertinaSpeciale, matCostaSpeciale, matCopertinaSpeciale]
    );
    libroSpeciale.position.set(s.offsetX, y + 0.22, 0.08);
    gruppo.add(libroSpeciale);
    registraInterattivo(libroSpeciale, s.dati);
  });

  registraIngombro(gruppo);

  return gruppo;
}

/* texture per il testo simulato sulle pagine aperte dei libri sui
   tavoli: iniziale miniata + righe fatte di brevi segmenti (le
   "parole"), proporzionata alle dimensioni reali della pagina */
function creaTexturaPaginaScritta() {
  const w = 100, h = 130;
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#EADFC0";
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = "#8B3A2A";
  ctx.fillRect(8, 10, 16, 16);
  ctx.fillStyle = "#EADFC0";
  ctx.font = "bold 13px Georgia, serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("I", 16, 19);
  ctx.fillStyle = "rgba(60,40,20,0.55)";
  for (let y = 14; y < h - 8; y += 8) {
    let x = (y < 26) ? 30 : 8;
    while (x < w - 8) {
      const larghezzaParola = 4 + Math.random() * 10;
      ctx.fillRect(x, y, larghezzaParola, 2);
      x += larghezzaParola + 3 + Math.random() * 4;
    }
  }
  return new THREE.CanvasTexture(canvas);
}

  const matBordoPagina = new THREE.MeshStandardMaterial({ color: 0xEADFC0 });

  gruppo.add(paginaDx);

  // il libro intero è l'oggetto interagibile (leggermente più grande, invisibile,

  // lampada da tavolo — base + fusto + paralume emissivo + luce calda debole,
  // usa lo stesso sistema di tremolio delle torce/candele per coerenza
  const baseLampada = new THREE.Mesh(
    new THREE.CylinderGeometry(0.055, 0.065, 0.04, 8),
    new THREE.MeshStandardMaterial({ color: 0x4a4030 })
  );
  baseLampada.position.set(0.48, 0.84, 0.28);
  gruppo.add(baseLampada);
  const fustoLampada = new THREE.Mesh(
    new THREE.CylinderGeometry(0.018, 0.022, 0.24, 8),

  );
  fustoLampada.position.set(0.48, 0.98, 0.28);
  gruppo.add(fustoLampada);
  const matParalume = new THREE.MeshStandardMaterial({
    color: 0xE8D9A8, emissive: 0xC9A227, emissiveIntensity: 0.5, side: THREE.DoubleSide
  });
  const paralume = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.14, 8, 1, true), matParalume);
  paralume.position.set(0.48, 1.17, 0.28);
  gruppo.add(paralume);
  const luceLampada = new THREE.PointLight(0xFFCB7A, 0.5, 4);
  luceLampada.position.set(0.48, 1.16, 0.28);
  gruppo.add(luceLampada);
  registraFiamma(matParalume, 0.5, luceLampada);

  // due sedie non speculari: distanza, lato e rotazione diversi tra loro
  function costruisciSedia() {
    const s = new THREE.Group();
    const sedile = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.06, 0.42), matLegnoChiaro);
    sedile.position.y = 0.46;
    s.add(sedile);
    const schienale = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.5, 0.06), matLegnoScuro);
    schienale.position.set(0, 0.72, -0.19);
    s.add(schienale);

    [[-0.17,-0.17],[0.17,-0.17],[-0.17,0.17],[0.17,0.17]].forEach(([gx,gz]) => {
      const gm = new THREE.Mesh(gambaSediaGeo, matLegnoScuro);
      gm.position.set(gx, 0.23, gz);
      s.add(gm);
    });
    return s;
  }
  const sedia1 = costruisciSedia();
  sedia1.position.set(-0.72, 0, 0.58);
  sedia1.rotation.y = Math.PI + 0.18;
  gruppo.add(sedia1);
  const sedia2 = costruisciSedia();
  sedia2.position.set(0.55, 0, -0.66);
  sedia2.rotation.y = -0.35;
  gruppo.add(sedia2);

  registraIngombro(gruppo);

  return gruppo;
}

/* ══════════════════════════════════════════
   MOVIMENTO A CLICK (stesso principio del prototipo)
   ══════════════════════════════════════════ */
let target = camera.position.clone();
let inMovimento = false;

const raycaster = new THREE.Raycaster();
const puntatore = new THREE.Vector2();

function pickGroundAt(clientX, clientY) {
  puntatore.x = (clientX / innerWidth) * 2 - 1;
  puntatore.y = -(clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(puntatore, camera);
  const hit = raycaster.intersectObject(pavimento)[0];
  return hit ? hit.point : null;
}

function pickOggetto(clientX, clientY) {
  puntatore.x = (clientX / innerWidth) * 2 - 1;
  puntatore.y = -(clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(puntatore, camera);
  const hits = raycaster.intersectObjects(oggettiInterattivi, false);
  return hits[0] ? hits[0].object : null;
}

/* ══════════════════════════════════════════
   SGUARDO A TRASCINAMENTO (mouse o dito, no Pointer Lock)
   ══════════════════════════════════════════ */
let yaw = 0, pitch = 0;
let trascinando = false, ultimoX = 0, ultimoY = 0, mosso = false;
// il gesto è "iniziato sul canvas" solo se mousedown/touchstart sono
// partiti dal canvas — evita che un click su un pulsante HTML fisso
// (torna indietro, taccuino, bottoni del popup) generi anche un click
// "fantasma" nel mondo 3D quando arriva il mouseup globale. Stesso
// identico rischio documentato per il popup, generalizzato qui a
// qualunque elemento HTML sovrapposto al canvas.
let gestoIniziatoSulCanvas = false;

const canvas = document.getElementById("canvas3d");

function inizioTocco(x, y) {
  gestoIniziatoSulCanvas = true;
  trascinando = true; mosso = false; ultimoX = x; ultimoY = y;
}
function muoviTocco(x, y) {
  if (!trascinando) return;
  const dx = x - ultimoX, dy = y - ultimoY;
  if (Math.abs(dx) + Math.abs(dy) > 6) mosso = true;
  // NB: verso invertito rispetto al "mouse-look" FPS diretto — qui si
  // segue la convenzione da viewer panoramico/touch ("trascini la scena",
  // come in uno street-view), più naturale su tablet senza pointer lock.
  // Se dopo il test preferisci il verso FPS classico, basta togliere il segno "-".
  yaw += dx * 0.004;
  pitch = Math.max(-1, Math.min(1, pitch + dy * 0.004));
  ultimoX = x; ultimoY = y;
}
function fineTocco(x, y) {
  if (!gestoIniziatoSulCanvas) return;
  gestoIniziatoSulCanvas = false;
  trascinando = false;
  if (document.getElementById("velo").classList.contains("attivo")) return;
  if (!mosso) gestisciClick(x, y);
}

canvas.addEventListener("mousedown", e => inizioTocco(e.clientX, e.clientY));
canvas.addEventListener("mousemove", e => muoviTocco(e.clientX, e.clientY));
addEventListener("mouseup", e => fineTocco(e.clientX, e.clientY));

canvas.addEventListener("touchstart", e => { const t = e.touches[0]; inizioTocco(t.clientX, t.clientY); }, { passive:true });
canvas.addEventListener("touchmove", e => { const t = e.touches[0]; muoviTocco(t.clientX, t.clientY); }, { passive:true });
canvas.addEventListener("touchend", e => { const t = e.changedTouches[0]; fineTocco(t.clientX, t.clientY); });

function gestisciClick(x, y) {
  const oggetto = pickOggetto(x, y);
  if (oggetto) {
    const posMondo = new THREE.Vector3();
    oggetto.getWorldPosition(posMondo);
    const distanza = camera.position.distanceTo(posMondo);
    if (distanza <= RAGGIO_INTERAZIONE) {
      apriInterazione(oggetto);
    } else {
      mostraSuggerimento("Avvicinati per interagire");
    }
    return;
  }
  const punto = pickGroundAt(x, y);
  if (punto) {
    const valido = risolviPosizioneValida(punto.x, punto.z);
    target = new THREE.Vector3(valido.x, ALTEZZA_OCCHI, valido.z);
    inMovimento = true;
  }
}

function mostraSuggerimento(testo) {
  const el = document.getElementById("suggerimento");
  el.textContent = testo;
  el.classList.add("attivo");
  clearTimeout(window._tSuggerimento);
  window._tSuggerimento = setTimeout(() => el.classList.remove("attivo"), 1400);
}

/* ══════════════════════════════════════════
   LOOP DI RENDER
   ══════════════════════════════════════════ */
function anima() {
  requestAnimationFrame(anima);

  if (inMovimento) {
    camera.position.lerp(target, 0.045);
    if (camera.position.distanceTo(target) < 0.05) inMovimento = false;
  }

  // corregge SEMPRE la posizione reale, non solo il punto di destinazione:
  // se il tragitto in linea retta verso il target attraverserebbe un
  // ostacolo, qui viene respinta fuori ad ogni fotogramma
  const posValida = risolviPosizioneValida(camera.position.x, camera.position.z);
  camera.position.x = posValida.x;
  camera.position.z = posValida.z;

  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  const intensita = 0.25 + 0.15 * Math.sin(performance.now() * 0.003);
  materialiPulsanti.forEach(m => { m.emissiveIntensity = intensita; });

  const t = performance.now() * 0.001;
  fiamme.forEach(f => {
    const tremolio = f.base * (0.82 + 0.18 * Math.sin(t * 9 + f.seme) + 0.06 * Math.sin(t * 23 + f.seme));
    f.materiale.emissiveIntensity = tremolio;
    if (f.luce) f.luce.intensity = f.luceBase * (0.8 + 0.2 * Math.sin(t * 9 + f.seme));
  });

  renderer.render(scene, camera);
}
anima();
